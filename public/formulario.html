<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SISTEMA OPERATIVO - Dirección de Seguridad</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="estilos.css">
</head>
<body>

<header>
  <h1>SISTEMA OPERATIVO</h1>
  <p>Dirección de Seguridad y Resguardo Municipal</p>
  <p>Municipalidad de Santiago</p>
</header>

<div class="container">

<form action="/guardar" method="POST">

<h2>Identificación del Procedimiento</h2>

<label>Fecha *</label>
<input type="date" id="fecha" name="fecha" required>

<label>Hora *</label>
<input type="time" id="hora" name="hora" required>

<label>Unidad *</label>
<select name="unidad" required>
  <option value="">Seleccione</option>
  <option>MÓVILES</option>
  <option>UTE</option>
  <option>AGENTES DE COPAMIENTO CASCO HISTÓRICO</option>
  <option>AGENTES DE COPAMIENTO EJE ALAMEDA</option>
</select>

<label>Turno *</label>
<select name="turno" required>
  <option value="">Seleccione</option>
  <option>T-1 (MAÑANA)</option>
  <option>T-2 (TARDE)</option>
  <option>T-3 (NOCHE)</option>
  <option>T-U (TURNO ÚNICO)</option>
</select>

<label>Funcionario Responsable *</label>
<select id="funcionarioSelect" name="funcionario" required>
  <option value="">Seleccione</option>
</select>

<label>Supervisor</label>
<input type="text" id="supervisorInput" name="supervisor" readonly>

<h2>Ubicación</h2>

<label>Calle *</label>
<input type="text" name="calle" required>

<label>Número</label>
<input type="text" name="numero">

<label>Barrio *</label>
<input type="text" name="barrio" required>

<h2>Clasificación del Servicio</h2>

<label>Categoría Principal *</label>
<select name="categoria" required>
  <option value="">Seleccione</option>
  <option>PATRULLAJE</option>
  <option>PUNTO FIJO</option>
  <option>DESPEJE PERSONAS EN SITUACIÓN DE CALLE</option>
  <option>DECOMISO COMERCIO NO AUTORIZADO</option>
  <option>FISCALIZACIÓN LOCAL COMERCIAL</option>
  <option>CONTROL VEHICULAR</option>
  <option>LABOR EDUCATIVA / PREVENCIÓN ACTIVA</option>
  <option>APOYO VIF</option>
</select>

<h3>Incivilidades / Delitos Detectados</h3>

<label><input type="checkbox" name="incivilidad" value="ROBO"> ROBO</label><br>
<label><input type="checkbox" name="incivilidad" value="AMENAZAS"> AMENAZAS</label><br>
<label><input type="checkbox" name="incivilidad" value="MICROTRAFICO"> MICROTRAFICO</label><br>
<label><input type="checkbox" name="incivilidad" value="USO DE ARMA DE FUEGO"> USO DE ARMA DE FUEGO</label><br>
<label><input type="checkbox" name="incivilidad" value="RIÑA O AGRESION"> RIÑA O AGRESION</label><br>
<label><input type="checkbox" name="incivilidad" value="AGRESIÓN A FUNCIONARIOS"> AGRESIÓN A FUNCIONARIOS</label><br>
<label><input type="checkbox" name="incivilidad" value="RUIDOS MOLESTOS"> RUIDOS MOLESTOS</label><br>
<label><input type="checkbox" name="incivilidad" value="CONSUMO DE ALCOHOL O DROGAS EN VIA PUBLICA"> CONSUMO EN VIA PUBLICA</label><br>
<label><input type="checkbox" name="incivilidad" value="VEHICULO MAL ESTACIONADO"> VEHICULO MAL ESTACIONADO</label><br>

<h2>Observación / Relato *</h2>
<textarea name="relato" rows="5" required></textarea>

<br><br>
<button type="submit">Registrar Procedimiento</button>

</form>
</div>

<!-- ============================= -->
<!-- SCRIPTS -->
<!-- ============================= -->

<script src="funcionarios.js"></script>

<script>
// Fecha y hora automática
document.getElementById("fecha").valueAsDate = new Date();
const ahora = new Date();
document.getElementById("hora").value =
  String(ahora.getHours()).padStart(2,'0') + ":" +
  String(ahora.getMinutes()).padStart(2,'0');

// Cargar funcionarios
const selectFuncionario = document.getElementById("funcionarioSelect");
const supervisorInput = document.getElementById("supervisorInput");

funcionarios.forEach(f => {
  const option = document.createElement("option");
  option.value = f.nombre;
  option.textContent = f.nombre + " (" + f.unidad + ")";
  selectFuncionario.appendChild(option);
});

// Autocompletar supervisor
selectFuncionario.addEventListener("change", function() {
  const seleccionado = funcionarios.find(f => f.nombre === this.value);
  if (seleccionado) {
    supervisorInput.value = seleccionado.supervisor;
  } else {
    supervisorInput.value = "";
  }
});
</script>

</body>
</html>
